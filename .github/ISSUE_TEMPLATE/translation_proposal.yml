name: "Translation proposal"
description: Offer to translate the book — or part of it — into another language.
title: "[Translation] <language>"
labels: ["translation"]
body:
  - type: input
    id: language
    attributes:
      label: Target language
      placeholder: "e.g., Hindi, Marathi, French, Spanish, Mandarin"
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Preface only
        - Mali Doctrines (Part IV) only
        - Seven Laws (Part V) only
        - Preface + Mali Doctrines + Seven Laws (the shareable core)
        - Full book
    validations:
      required: true
  - type: textarea
    id: background
    attributes:
      label: Your background
      description: Brief — translation experience, native/fluent speaker, legal background if relevant. This helps reviewers, not gatekeep.
    validations:
      required: true
  - type: input
    id: timeline
    attributes:
      label: Realistic timeline
      placeholder: "e.g., 6–8 weeks for Part V"
  - type: checkboxes
    id: terms
    attributes:
      label: Terms
      options:
        - label: I understand the translation will be released under CC-BY 4.0 with my name credited as Translator.
          required: true
        - label: I will not introduce my own commentary into the body text (commentary belongs in /annotations/).
          required: true
